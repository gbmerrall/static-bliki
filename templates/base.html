<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}{{ site.description }}{% endblock %}">
    <title>{% block title %}{{ site.name }}{% endblock %}</title>

    <link rel="stylesheet" href="/static/css/normalize.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} RSS Feed" href="/feed.xml">
</head>

<body>
    <header class="site-header">
        <div class="container">
            <a href="/" class="site-title">{{ site.name }}</a>
            <nav class="nav-menu">
                <a href="/" class="nav-link">Posts</a>
                <a href="/wiki/" class="nav-link">Wiki</a>
                <a href="/categories/" class="nav-link">Categories</a>
                <a href="/search/" class="nav-link">Search</a>
            </nav>
        </div>
    </header>

    <main class="site-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            {% if site.author %}
            <p>&copy; {{ site.author }}</p>
            {% endif %}
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
